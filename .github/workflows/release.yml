name: Release npm package

on:
  push:
    tags:
    - 'v*'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  rusi_linux_prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
    - name: Install Zig
      run: |
        bash ./scripts/thirdparty-downloads.sh install-zig linux-amd64 "$HOME/.local/zig"
        echo "$HOME/.local/zig" >> "$GITHUB_PATH"
        "$HOME/.local/zig/zig" version
    - name: Build Rusi Linux, musl, and Windows helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-linux
        npm install -g @cyclonedx/cdxgen
        make linux linuxmusl windows sbom
        popd
    - name: Upload Rusi Linux helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: rusi-build-linux
        path: thirdparty/rusi/build/
        if-no-files-found: error
        retention-days: 1
  rusi_darwin_prebuild:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Build Rusi Darwin helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-darwin
        make darwin
        popd
    - name: Upload Rusi Darwin helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: rusi-build-darwin
        path: |
          thirdparty/rusi/build/rusi-darwin-*
          thirdparty/rusi/build/rusi-darwin-*.sha256
        if-no-files-found: error
        retention-days: 1
  cdxui_linux_prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
    - name: Install Zig
      run: |
        bash ./scripts/thirdparty-downloads.sh install-zig linux-amd64 "$HOME/.local/zig"
        echo "$HOME/.local/zig" >> "$GITHUB_PATH"
        "$HOME/.local/zig/zig" version
    - name: Build cdxui Linux, musl, and Windows helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/cdxui
        make bootstrap-linux
        npm install -g @cyclonedx/cdxgen
        make linux linuxmusl windows sbom
        popd
    - name: Upload cdxui Linux helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: cdxui-build-linux
        path: thirdparty/cdxui/build/
        if-no-files-found: error
        retention-days: 1
  cdxui_darwin_prebuild:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Build cdxui Darwin helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/cdxui
        make bootstrap-darwin
        make darwin
        popd
    - name: Upload cdxui Darwin helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: cdxui-build-darwin
        path: |
          thirdparty/cdxui/build/cdxui-darwin-*
          thirdparty/cdxui/build/cdxui-darwin-*.sha256
        if-no-files-found: error
        retention-days: 1
  pkg:
    needs:
    - rusi_linux_prebuild
    - rusi_darwin_prebuild
    - cdxui_linux_prebuild
    - cdxui_darwin_prebuild
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write  # needed for publishing to GH package registry
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
        scope: '@cdxgen'
        package-manager-cache: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
        cache: false
    - uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a  # v2.4.0
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
    - run: oras version
    - name: Authenticate to GHCR
      run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_USERNAME" --password-stdin
      env:
        GITHUB_USERNAME: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Download Rusi helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: rusi-build-linux
        path: thirdparty/rusi/build
    - name: Download Rusi Darwin helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: rusi-build-darwin
        path: thirdparty/rusi/build
    - name: Download cdxui Linux helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: cdxui-build-linux
        path: thirdparty/cdxui/build
    - name: Download cdxui Darwin helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: cdxui-build-darwin
        path: thirdparty/cdxui/build
    - name: Release
      run: |
        npm install -g @cyclonedx/cdxgen
        bash ./scripts/thirdparty-downloads.sh install-upx linux-amd64 ./upx
        sudo install -m 0755 ./upx /usr/local/bin/upx
        rm -f ./upx
        bash build.sh
        npm publish --provenance --access=public

        pushd packages/windows-amd64
        npm publish --provenance --access=public
        popd

        pushd packages/linux-amd64
        npm publish --provenance --access=public
        popd

        pushd packages/linux-arm64
        npm publish --provenance --access=public
        popd

        pushd packages/linuxmusl-amd64
        npm publish --provenance --access=public
        popd

        pushd packages/linuxmusl-arm64
        npm publish --provenance --access=public
        popd

        pushd packages/linux-riscv64
        npm publish --provenance --access=public
        popd

        pushd packages/linux-arm
        npm publish --provenance --access=public
        popd

        pushd packages/windows-arm64
        npm publish --provenance --access=public
        popd

        pushd packages/darwin-arm64
        npm publish --provenance --access=public
        popd

        pushd packages/darwin-amd64
        npm publish --provenance --access=public
        popd

        pushd packages/ppc64
        npm publish --provenance --access=public
        popd

        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./plugins/golem 'golem-*'
        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./plugins/rusi 'rusi-*'
        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./plugins/cdxui 'cdxui-*'
        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./plugins/trustinspector 'trustinspector-cdxgen-*'

        gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
        gh release upload "$GITHUB_REF_NAME" \
          ./plugins/golem/golem-* \
          ./plugins/rusi/rusi-* \
          ./plugins/cdxui/cdxui-* \
          ./plugins/trustinspector/trustinspector-cdxgen-* \
          --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_OPTIONS: --max_old_space_size=4096
