name: Build npm package

on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  pkg:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
      if: matrix.os == 'ubuntu-latest'
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1.2.4
    - run: oras version
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        wget https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-amd64_linux.tar.xz
        tar -xvf upx-5.1.1-amd64_linux.tar.xz
        chmod +x upx-5.1.1-amd64_linux/upx
        sudo cp upx-5.1.1-amd64_linux/upx /usr/local/bin/
        bash build.sh
        pip3 install blint
        blint -i plugins -o /tmp/reports --no-error
        npm publish --dry-run
        pushd packages/windows-amd64
        npm publish --dry-run
        popd
        pushd packages/linux-amd64
        npm publish --dry-run
        popd
        pushd packages/linux-arm64
        npm publish --dry-run
        popd
        pushd packages/linuxmusl-amd64
        npm publish --dry-run
        popd
        pushd packages/linuxmusl-arm64
        npm publish --dry-run
        popd
        pushd packages/linux-riscv64
        npm publish --dry-run
        popd
        pushd packages/linux-arm
        npm publish --dry-run
        popd
        pushd packages/windows-arm64
        npm publish --dry-run
        popd
        pushd packages/darwin-arm64
        npm publish --dry-run
        popd
        pushd packages/darwin-amd64
        npm publish --dry-run
        popd
        pushd packages/ppc64
        npm publish --dry-run
        popd
      env:
        NODE_OPTIONS: --max_old_space_size=4096        
  winpkg:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        .\build.ps1
