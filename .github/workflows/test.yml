name: Build npm package

on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  pkg:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a  # v2.4.0
      if: matrix.os == 'ubuntu-latest'
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
    - run: oras version
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        wget https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-amd64_linux.tar.xz
        tar -xvf upx-5.1.1-amd64_linux.tar.xz
        chmod +x upx-5.1.1-amd64_linux/upx
        sudo cp upx-5.1.1-amd64_linux/upx /usr/local/bin/
        bash build.sh
        pip3 install blint
        blint -i plugins -o /tmp/reports --no-error
        npm publish --dry-run
        pushd packages/windows-amd64
        npm publish --dry-run
        popd
        pushd packages/linux-amd64
        npm publish --dry-run
        popd
        pushd packages/linux-arm64
        npm publish --dry-run
        popd
        pushd packages/linuxmusl-amd64
        npm publish --dry-run
        popd
        pushd packages/linuxmusl-arm64
        npm publish --dry-run
        popd
        pushd packages/linux-riscv64
        npm publish --dry-run
        popd
        pushd packages/linux-arm
        npm publish --dry-run
        popd
        pushd packages/windows-arm64
        npm publish --dry-run
        popd
        pushd packages/darwin-arm64
        npm publish --dry-run
        popd
        pushd packages/darwin-amd64
        npm publish --dry-run
        popd
        pushd packages/ppc64
        npm publish --dry-run
        popd
      env:
        NODE_OPTIONS: --max_old_space_size=4096        
  winpkg:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        .\build.ps1
