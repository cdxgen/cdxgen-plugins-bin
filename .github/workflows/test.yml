name: Build npm package

on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  rusi_linux_prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
    - name: Install Zig
      run: |
        bash ./scripts/thirdparty-downloads.sh install-zig linux-amd64 "$HOME/.local/zig"
        echo "$HOME/.local/zig" >> "$GITHUB_PATH"
        "$HOME/.local/zig/zig" version
    - name: Build Rusi Linux, musl, and Windows helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-linux
        npm install -g @cyclonedx/cdxgen
        make linux linuxmusl windows sbom
        popd
    - name: Upload Rusi Linux helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: rusi-build-linux
        path: thirdparty/rusi/build/
        if-no-files-found: error
        retention-days: 1
  rusi_darwin_prebuild:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Build Rusi Darwin helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-darwin
        make darwin
        popd
    - name: Upload Rusi Darwin helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: rusi-build-darwin
        path: |
          thirdparty/rusi/build/rusi-darwin-*
          thirdparty/rusi/build/rusi-darwin-*.sha256
        if-no-files-found: error
        retention-days: 1
  cdxui_linux_prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
    - name: Install Zig
      run: |
        bash ./scripts/thirdparty-downloads.sh install-zig linux-amd64 "$HOME/.local/zig"
        echo "$HOME/.local/zig" >> "$GITHUB_PATH"
        "$HOME/.local/zig/zig" version
    - name: Build cdxui Linux, musl, and Windows helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/cdxui
        make bootstrap-linux
        npm install -g @cyclonedx/cdxgen
        make linux linuxmusl windows sbom
        popd
    - name: Upload cdxui Linux helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: cdxui-build-linux
        path: thirdparty/cdxui/build/
        if-no-files-found: error
        retention-days: 1
  cdxui_darwin_prebuild:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Build cdxui Darwin helper artifacts
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/cdxui
        make bootstrap-darwin
        make darwin
        popd
    - name: Upload cdxui Darwin helper artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: cdxui-build-darwin
        path: |
          thirdparty/cdxui/build/cdxui-darwin-*
          thirdparty/cdxui/build/cdxui-darwin-*.sha256
        if-no-files-found: error
        retention-days: 1
  pkg:
    needs:
    - rusi_linux_prebuild
    - rusi_darwin_prebuild
    - cdxui_linux_prebuild
    - cdxui_darwin_prebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a  # v2.4.0
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
    - run: oras version
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Run packaging helper tests
      run: |
        bash ./scripts/assert-trivy-cdxgen-sbom.test.sh
        bash ./scripts/check-package-size.test.sh
        bash ./scripts/thirdparty-downloads.test.sh
        bash ./scripts/stage-built-plugins.test.sh
        bash ./scripts/publish-helper-oras.test.sh
        bash ./scripts/root-package-publish.test.sh
        node --test ./scripts/generate-metadata.test.js
    - name: Download Rusi helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: rusi-build-linux
        path: thirdparty/rusi/build
    - name: Download Rusi Darwin helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: rusi-build-darwin
        path: thirdparty/rusi/build
    - name: Download cdxui Linux helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: cdxui-build-linux
        path: thirdparty/cdxui/build
    - name: Download cdxui Darwin helper artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: cdxui-build-darwin
        path: thirdparty/cdxui/build
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        bash ./scripts/thirdparty-downloads.sh install-upx linux-amd64 ./upx
        sudo install -m 0755 ./upx /usr/local/bin/upx
        rm -f ./upx
        bash build.sh
        [[ -f packages/linuxmusl-amd64/plugins/golem/golem-linuxmusl-amd64 ]]
        [[ -f packages/linuxmusl-amd64/plugins/golem/golem-linuxmusl-amd64.sha256 ]]
        [[ -f packages/linuxmusl-amd64/plugins/rusi/rusi-linuxmusl-amd64 ]]
        [[ -f packages/linuxmusl-amd64/plugins/rusi/rusi-linuxmusl-amd64.sha256 ]]
        [[ -f packages/linuxmusl-amd64/plugins/trustinspector/trustinspector-cdxgen-linuxmusl-amd64 ]]
        [[ -f packages/linuxmusl-amd64/plugins/trustinspector/trustinspector-cdxgen-linuxmusl-amd64.sha256 ]]
        [[ -f packages/linuxmusl-arm64/plugins/golem/golem-linuxmusl-arm64 ]]
        [[ -f packages/linuxmusl-arm64/plugins/golem/golem-linuxmusl-arm64.sha256 ]]
        [[ -f packages/linuxmusl-arm64/plugins/rusi/rusi-linuxmusl-arm64 ]]
        [[ -f packages/linuxmusl-arm64/plugins/rusi/rusi-linuxmusl-arm64.sha256 ]]
        [[ -f packages/linuxmusl-arm64/plugins/trustinspector/trustinspector-cdxgen-linuxmusl-arm64 ]]
        [[ -f packages/linuxmusl-arm64/plugins/trustinspector/trustinspector-cdxgen-linuxmusl-arm64.sha256 ]]
        [[ -f packages/darwin-arm64/plugins/rusi/rusi-darwin-arm64 ]]
        [[ -f packages/darwin-arm64/plugins/rusi/rusi-darwin-arm64.sha256 ]]
        [[ -f packages/darwin-amd64/plugins/rusi/rusi-darwin-amd64 ]]
        [[ -f packages/darwin-amd64/plugins/rusi/rusi-darwin-amd64.sha256 ]]
        [[ -f packages/darwin-arm64/plugins/cdxui/cdxui-darwin-arm64 ]]
        [[ -f packages/darwin-arm64/plugins/cdxui/cdxui-darwin-arm64.sha256 ]]
        [[ -f packages/darwin-amd64/plugins/cdxui/cdxui-darwin-amd64 ]]
        [[ -f packages/darwin-amd64/plugins/cdxui/cdxui-darwin-amd64.sha256 ]]
        [[ -f packages/windows-amd64/plugins/rusi/rusi-windows-amd64.exe ]]
        [[ -f packages/windows-amd64/plugins/rusi/rusi-windows-amd64.exe.sha256 ]]
        [[ -f packages/windows-amd64/plugins/cdxui/cdxui-windows-amd64.exe ]]
        [[ -f packages/windows-amd64/plugins/cdxui/cdxui-windows-amd64.exe.sha256 ]]
        bash ./scripts/root-package-publish.test.sh
        npm publish --dry-run
      env:
        NODE_OPTIONS: --max_old_space_size=4096        
    - name: Upload packaged plugins
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: packaged-plugins
        path: packages/
        if-no-files-found: error
        retention-days: 1
  pkg_publish:
    needs: pkg
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        package_name:
        - windows-amd64
        - linux-amd64
        - linux-arm64
        - linuxmusl-amd64
        - linuxmusl-arm64
        - linux-riscv64
        - linux-arm
        - windows-arm64
        - darwin-arm64
        - darwin-amd64
        - ppc64
    steps:
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - name: Download packaged plugins
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: packaged-plugins
        path: .
    - name: Verify package publish dry-run
      run: |
        package_name='${{ matrix.package_name }}'
        package_dir=''
        for candidate in \
          "packages/${package_name}" \
          "${package_name}" \
          "packages/packages/${package_name}"
        do
          if [[ -d "$candidate" ]]; then
            package_dir="$candidate"
            break
          fi
        done

        if [[ -z "$package_dir" ]]; then
          echo "Downloaded package directory not found for ${package_name}" >&2
          find . -maxdepth 3 -type d | sort >&2
          exit 1
        fi

        pushd "$package_dir"
        npm publish --dry-run
        popd
  winpkg:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        .\build.ps1
    - name: Windows trustinspector E2E smoke
      shell: pwsh
      run: |
        $ManifestPath = Join-Path (Get-Location) 'plugins\plugins-manifest.json'
        if (-not (Test-Path $ManifestPath)) {
          throw 'plugins-manifest.json was not generated on Windows.'
        }
        $Manifest = Get-Content $ManifestPath -Raw | ConvertFrom-Json
        if (-not ($Manifest.plugins.name -contains 'trustinspector')) {
          throw 'trustinspector metadata was not recorded in plugins-manifest.json.'
        }

        $TrustInspector = Join-Path (Get-Location) 'plugins\trustinspector\trustinspector-cdxgen-windows-amd64.exe'
        if (-not (Test-Path $TrustInspector)) {
          throw 'trustinspector helper was not staged in plugins\trustinspector.'
        }

        $HostResult = & $TrustInspector host | Out-String | ConvertFrom-Json
        if ($null -eq $HostResult.hostFindings) {
          throw 'trustinspector host output did not include hostFindings.'
        }

        $Candidates = [System.Collections.Generic.List[string]]::new()
        foreach ($CommandName in @('powershell.exe', 'pwsh.exe')) {
          try {
            $Resolved = (Get-Command $CommandName -ErrorAction Stop | Select-Object -First 1).Source
            if ($Resolved -and (Test-Path $Resolved)) {
              $Candidates.Add($Resolved)
            }
          } catch {
          }
        }
        foreach ($PathCandidate in @(
          (Join-Path $env:SystemRoot 'System32\WindowsPowerShell\v1.0\powershell.exe'),
          (Join-Path $env:SystemRoot 'System32\cmd.exe'),
          (Join-Path $env:SystemRoot 'System32\notepad.exe'),
          $TrustInspector
        )) {
          if ($PathCandidate -and (Test-Path $PathCandidate)) {
            $Candidates.Add($PathCandidate)
          }
        }
        $TargetBinary = $Candidates | Select-Object -Unique | Select-Object -First 1
        if (-not $TargetBinary) {
          throw 'Unable to locate any Windows executable to inspect with trustinspector.'
        }
        $PathResult = & $TrustInspector paths $TargetBinary | Out-String | ConvertFrom-Json
        if (($PathResult.inspections | Measure-Object).Count -lt 1) {
          throw "trustinspector paths output did not include any inspections for target $TargetBinary."
        }
        if (-not ($PathResult.inspections[0].properties | Where-Object { $_.name -eq 'cdx:windows:authenticode:status' })) {
          throw 'trustinspector paths output did not include Authenticode status properties.'
        }
