name: Build and Upload native binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  builder:
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-15']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write  # needed for publishing to GH container registry
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 25.x
        registry-url: https://registry.npmjs.org/
        scope: '@cdxgen'
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '^1.25.6'
        cache: false
    - name: setup upx
      run: |
        bash ./scripts/thirdparty-downloads.sh install-upx linux-amd64 ./upx
        sudo install -m 0755 ./upx /usr/local/bin/upx
        rm -f ./upx
      if: matrix.os == 'ubuntu-24.04'
    - name: Install Zig
      run: |
        sudo apt-get update
        sudo apt-get install -y zig
      if: matrix.os == 'ubuntu-24.04'
    - name: setup upx
      run: |
        bash ./scripts/thirdparty-downloads.sh install-upx linux-arm64 ./upx
        sudo install -m 0755 ./upx /usr/local/bin/upx
        rm -f ./upx
      if: matrix.os == 'ubuntu-24.04-arm'
    - name: Setup Rust nightly
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain nightly
          . "$HOME/.cargo/env"
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        rustup toolchain install nightly --profile minimal --component rust-src --component llvm-tools --component rustc-dev
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-15'
    - name: Setup swift
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
      run: |
        curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz && \
        tar zxf swiftly-$(uname -m).tar.gz && \
        ./swiftly init --quiet-shell-followup && \
        . ~/.local/share/swiftly/env.sh && \
        hash -r
    - name: Setup swift
      if: matrix.os == 'macos-15'
      run: |
        curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg && \
        installer -pkg swiftly.pkg -target CurrentUserHomeDirectory && \
        ~/.swiftly/bin/swiftly init --quiet-shell-followup && \
        . ~/.swiftly/env.sh && \
        hash -r
    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
    - run: oras version
    - name: Build
      run: |
        npm install -g @cyclonedx/cdxgen
        bash thirdparty/sourcekitten/build.sh
        ls -l thirdparty/sourcekitten/SourceKitten/.build/release
        echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
      env:
        GITHUB_USERNAME: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload golem and trustinspector helper artifacts
      run: |
        pushd thirdparty/golem
        make all
        popd

        pushd thirdparty/trustinspector
        make all
        popd

        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./thirdparty/golem/build 'golem-*'
        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./thirdparty/trustinspector/build 'trustinspector-cdxgen-*'
      if: matrix.os == 'ubuntu-24.04'
    - name: Upload Rusi Linux, musl, and Windows helper artifacts
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-linux
        npm install -g @cyclonedx/cdxgen
        make linux linuxmusl windows sbom
        popd

        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./thirdparty/rusi/build 'rusi-*'
      if: matrix.os == 'ubuntu-24.04'
    - name: Upload Rusi Darwin helper artifacts
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        pushd thirdparty/rusi
        make bootstrap-darwin
        npm install -g @cyclonedx/cdxgen
        make darwin sbom
        popd

        bash ./scripts/publish-helper-oras.sh ghcr.io/cdxgen/cdxgen-plugins-bin ./thirdparty/rusi/build 'rusi-darwin-*'
      if: matrix.os == 'macos-15'
    - name: Upload linux amd64
      run: |
        pushd thirdparty/trivy
        make build/linuxmusl_amd64
        sudo chown -R $USER:$USER build/        
        upx -9 --lzma ./build/trivy-cdxgen-linuxmusl-amd64
        sha256sum ./build/trivy-cdxgen-linuxmusl-amd64 > ./build/trivy-cdxgen-linuxmusl-amd64.sha256
        make sbom
        popd
        mkdir -p uploads
        cp thirdparty/trivy/build/trivy* uploads/
        cp thirdparty/trivy/build/sbom-trivy-postbuild.cdx.json uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sbom-sourcekitten-postbuild.cdx.json uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sourcekitten uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sourcekitten.sha256 uploads/
        cd uploads
        oras push ghcr.io/cdxgen/cdxgen-plugins-bin:linux-amd64 \
          --artifact-type application/vnd.cdxgen.plugins.platform-bundle.v1 \
          ./trivy-cdxgen-linuxmusl-amd64:application/octet-stream \
          ./trivy-cdxgen-linuxmusl-amd64.sha256:text/plain \
          ./sbom-trivy-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sbom-sourcekitten-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sourcekitten:application/octet-stream \
          ./sourcekitten.sha256:text/plain
      if: matrix.os == 'ubuntu-24.04'
    - name: Upload linux arm64
      run: |
        pushd thirdparty/trivy
        make build/linuxmusl_arm64
        sudo chown -R $USER:$USER build/
        upx -9 --lzma ./build/trivy-cdxgen-linuxmusl-arm64
        sha256sum ./build/trivy-cdxgen-linuxmusl-arm64 > ./build/trivy-cdxgen-linuxmusl-arm64.sha256
        make sbom
        popd
        mkdir -p uploads
        cp thirdparty/trivy/build/trivy* uploads/
        cp thirdparty/trivy/build/sbom-trivy-postbuild.cdx.json uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sbom-sourcekitten-postbuild.cdx.json uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sourcekitten uploads/
        cp thirdparty/sourcekitten/SourceKitten/.build/release/sourcekitten.sha256 uploads/
        cd uploads
        oras push ghcr.io/cdxgen/cdxgen-plugins-bin:linux-arm64 \
          --artifact-type application/vnd.cdxgen.plugins.platform-bundle.v1 \
          ./trivy-cdxgen-linuxmusl-arm64:application/octet-stream \
          ./trivy-cdxgen-linuxmusl-arm64.sha256:text/plain \
          ./sbom-trivy-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sbom-sourcekitten-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sourcekitten:application/octet-stream \
          ./sourcekitten.sha256:text/plain
      if: matrix.os == 'ubuntu-24.04-arm'
    - name: Upload darwin amd64
      run: |
        cd thirdparty/sourcekitten/SourceKitten/.build/release/
        oras push ghcr.io/cdxgen/cdxgen-plugins-bin:darwin-amd64 \
          --artifact-type application/vnd.cdxgen.plugins.platform-bundle.v1 \
          ./sourcekitten:application/octet-stream \
          ./sbom-sourcekitten-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sourcekitten.sha256:text/plain
      if: matrix.os == 'macos-15-intel'
    - name: Upload darwin arm64
      run: |
        cd thirdparty/sourcekitten/SourceKitten/.build/release/
        oras push ghcr.io/cdxgen/cdxgen-plugins-bin:darwin-arm64 \
          --artifact-type application/vnd.cdxgen.plugins.platform-bundle.v1 \
          ./sourcekitten:application/octet-stream \
          ./sbom-sourcekitten-postbuild.cdx.json:application/vnd.cyclonedx+json \
          ./sourcekitten.sha256:text/plain
      if: matrix.os == 'macos-15'
