[package]
name = "cdxui"
version = "0.1.0"
edition = "2021"
description = "Interactive terminal UI for CycloneDX BOM exploration"
license = "MIT"
repository = "https://github.com/CycloneDX/cdxgen-plugins-bin"

[[bin]]
name = "cdxui"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
unicode-width = "0.2"
strip-ansi-escapes = "0.2"

[dev-dependencies]
tempfile = "3"
